<ion-header>
  <ion-toolbar>
    <ion-title>Register</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">
    <ion-list>
      <ion-item>
        <ion-input label="Name" formControlName="name" placeholder="Enter your name"></ion-input>
      </ion-item>
      
      <ion-item>
        <ion-input label="Email" type="email" formControlName="email" placeholder="Enter your email"></ion-input>
      </ion-item>

      <ion-item>
        <ion-input label="Password" type="password" formControlName="password" placeholder="Enter password"></ion-input>
      </ion-item>
    </ion-list>

    <ion-button expand="block" type="submit" [disabled]="!registrationForm.valid">
      Register
    </ion-button>
  </form>
</ion-content>
